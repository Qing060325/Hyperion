services:
  hyperion:
    build: .
    container_name: hyperion
    ports:
      - "${PORT:-8080}:8080"
    depends_on:
      clash:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hyperion-net

  clash:
    build:
      context: .
      dockerfile: Dockerfile.hades
    container_name: hyperion-clash
    volumes:
      - ./config:/root/.config/hades
    ports:
      - "${PROXY_PORT:-7890}:7890"
    cap_add:
      - NET_ADMIN
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/version"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - hyperion-net

networks:
  hyperion-net:
    driver: bridge
