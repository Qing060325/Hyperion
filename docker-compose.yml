services:
  hades:
    build:
      context: ./Hades
      dockerfile: Dockerfile
    container_name: hades
    hostname: hades
    volumes:
      - ./config:/root/.config/hades
    ports:
      - "${PROXY_PORT:-7890}:7890"
      - "${API_PORT:-9090}:9090"
    cap_add:
      - NET_ADMIN
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/version"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      hyperion-net:
        aliases:
          - hades

  hyperion:
    build: .
    container_name: hyperion
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - HADES_API_URL=http://hades:9090
      - HADES_SECRET=${SECRET:-}
    depends_on:
      hades:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hyperion-net

networks:
  hyperion-net:
    driver: bridge
