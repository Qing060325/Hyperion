services:
  hyperion:
    build: .
    container_name: hyperion
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - CLASH_API_URL=http://clash:9090
      - CLASH_WS_URL=http://clash:9090
    depends_on:
      clash:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hyperion-net

  clash:
    image: metacubex/mihomo:v1.19.0
    container_name: hyperion-clash
    volumes:
      - ./config:/root/.config/mihomo
    ports:
      - "${PROXY_PORT:-7890}:7890"
    cap_add:
      - NET_ADMIN
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/version"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - hyperion-net

networks:
  hyperion-net:
    driver: bridge
